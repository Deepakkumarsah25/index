<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RRID Tech — Learn. Practice. Achieve. Succeed Together.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 78% 38%, rgba(47, 139, 255, 0.18) 0%, rgba(47, 139, 255, 0) 45%),
                radial-gradient(circle at 10% 90%, rgba(31, 95, 214, 0.12) 0%, rgba(31, 95, 214, 0) 50%),
                linear-gradient(160deg, #050b1a 0%, #0a1430 55%, #0d1b3d 100%);
            color: #f5f8ff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== WRAPPER ===== */
        .wrap {
            max-width: 1280px;
            margin: 0 auto;
            padding: 28px 48px 40px;
            position: relative;
        }

        /* ===== TOP NAV BUTTONS (replaces badge) ===== */
        .top-actions {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .top-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 22px;
            border-radius: 50px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            background: rgba(15, 30, 64, 0.70);
            backdrop-filter: blur(6px);
            color: #dbe6ff;
            border: 1px solid rgba(86, 138, 255, 0.30);
            box-shadow: 0 0 20px rgba(47, 139, 255, 0.06);
        }
        .top-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(86, 138, 255, 0.60);
            box-shadow: 0 6px 24px rgba(47, 139, 255, 0.18);
        }
        .top-btn .icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            color: #2f8bff;
        }
        .top-btn .icon-gold {
            color: #ffc94a;
        }

        .top-btn-primary {
            background: linear-gradient(135deg, #2f8bff, #1457d6);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 16px rgba(31, 95, 214, 0.35);
        }
        .top-btn-primary:hover {
            box-shadow: 0 8px 28px rgba(31, 95, 214, 0.50);
            border-color: transparent;
        }
        .top-btn-primary .icon {
            color: #fff;
        }

        /* ===== HERO ===== */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            align-items: center;
            margin-top: 8px;
            position: relative;
        }

        .hero-left h1 {
            font-size: 52px;
            line-height: 1.06;
            font-weight: 800;
            letter-spacing: -1.5px;
        }
        .hero-left h1 .accent {
            color: #2f8bff;
            text-shadow: 0 0 40px rgba(47, 139, 255, 0.25);
        }

        .hero-swoosh {
            width: 120px;
            height: 8px;
            margin: 8px 0 14px 2px;
        }

        .hero-sub {
            color: #a9b6d6;
            font-size: 16px;
            line-height: 1.6;
            max-width: 520px;
            margin-bottom: 22px;
        }

        /* ===== CTA ROW ===== */
        .cta-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 600;
            padding: 14px 24px;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            flex: 0 1 auto;
            white-space: nowrap;
        }
        .btn svg {
            flex-shrink: 0;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2f8bff, #1457d6);
            color: #fff;
            box-shadow: 0 6px 18px rgba(31, 95, 214, 0.40);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(31, 95, 214, 0.55);
        }
        .btn-outline {
            background: transparent;
            color: #fff;
            border: 1.5px solid rgba(255, 255, 255, 0.25);
        }
        .btn-outline:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        /* ===== MINI FEATURES ===== */
        .mini-features {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin-top: 2px;
        }
        .mini-feature {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .mini-icon {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            border-radius: 8px;
            background: rgba(47, 139, 255, 0.12);
            border: 1px solid rgba(86, 138, 255, 0.20);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mini-icon .icon-blue {
            color: #2f8bff;
        }
        .mini-feature h4 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 1px;
        }
        .mini-feature p {
            font-size: 11.5px;
            color: #a9b6d6;
            line-height: 1.3;
        }

        /* ===== HERO RIGHT & FLOATING BADGES ===== */
        .hero-right {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-image-wrap {
            position: relative;
            width: 100%;
            max-width: 560px;
            border-radius: 16px;
            overflow: visible;
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(86, 138, 255, 0.18);
            background: #0a1430;
        }
        .hero-image-wrap img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
        }

        .float-badge {
            position: absolute;
            background: rgba(10, 20, 45, 0.88);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(86, 138, 255, 0.30);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 10, 0.50);
            animation: floaty 5s ease-in-out infinite;
            z-index: 2;
            min-width: 160px;
        }
        .float-badge .fb-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(47, 139, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .float-badge .fb-icon.gold {
            background: rgba(255, 201, 74, 0.15);
        }
        .float-badge .fb-text h4 {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }
        .float-badge .fb-text p {
            font-size: 11px;
            color: #a9b6d6;
            line-height: 1.2;
        }

        .fb-1 {
            top: 10%;
            left: -4%;
            animation-delay: 0s;
        }
        .fb-2 {
            bottom: 14%;
            right: -6%;
            animation-delay: 0.6s;
        }
        .fb-3 {
            top: 50%;
            right: -8%;
            transform: translateY(-50%);
            animation-delay: 1.2s;
        }

        @keyframes floaty {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }
        .fb-2 {
            animation-name: floaty2;
        }
        @keyframes floaty2 {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }
        .fb-3 {
            animation-name: floaty3;
        }
        @keyframes floaty3 {
            0%,
            100% {
                transform: translateY(0) translateY(-50%);
            }
            50% {
                transform: translateY(-5px) translateY(-50%);
            }
        }

        /* ===== STATS STRIP ===== */
        .stats-strip {
            margin-top: 28px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            padding: 18px 24px;
            background: rgba(10, 20, 45, 0.55);
            border: 1px solid rgba(86, 138, 255, 0.15);
            border-radius: 14px;
            backdrop-filter: blur(4px);
        }
        .stat {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .stat .ic {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: rgba(47, 139, 255, 0.12);
            border: 1px solid rgba(86, 138, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .stat .ic .icon-blue {
            color: #2f8bff;
        }
        .stat h3 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }
        .stat p {
            font-size: 12.5px;
            color: #a9b6d6;
            line-height: 1.2;
        }

        /* ===== FEATURES SECTION ===== */
        .features-section {
            margin-top: 32px;
        }

        .features-section .section-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #2f8bff;
            margin-bottom: 4px;
        }
        .features-section h2 {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .features-section h2 .accent {
            color: #2f8bff;
        }
        .features-section .section-desc {
            color: #a9b6d6;
            font-size: 14.5px;
            max-width: 600px;
            margin-bottom: 24px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .feature-card {
            background: rgba(13, 23, 48, 0.80);
            border: 1px solid rgba(86, 138, 255, 0.14);
            border-radius: 14px;
            padding: 22px 20px;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            cursor: default;
        }
        .feature-card:hover {
            transform: translateY(-3px);
            border-color: rgba(86, 138, 255, 0.35);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
        }
        .feature-card .fc-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .fc-icon.blue {
            background: radial-gradient(circle at 30% 30%, rgba(47, 139, 255, 0.28), rgba(47, 139, 255, 0.05));
        }
        .fc-icon.gold {
            background: radial-gradient(circle at 30% 30%, rgba(255, 201, 74, 0.22), rgba(255, 201, 74, 0.04));
        }
        .fc-icon.purple {
            background: radial-gradient(circle at 30% 30%, rgba(139, 60, 255, 0.22), rgba(139, 60, 255, 0.04));
        }
        .fc-icon.teal {
            background: radial-gradient(circle at 30% 30%, rgba(47, 216, 196, 0.22), rgba(47, 216, 196, 0.04));
        }
        .fc-icon.orange {
            background: radial-gradient(circle at 30% 30%, rgba(255, 160, 47, 0.22), rgba(255, 160, 47, 0.04));
        }
        .fc-icon.pink {
            background: radial-gradient(circle at 30% 30%, rgba(255, 90, 160, 0.22), rgba(255, 90, 160, 0.04));
        }

        .feature-card h3 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .feature-card p {
            font-size: 13px;
            color: #a9b6d6;
            line-height: 1.5;
        }
        .feature-card .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 12px;
        }
        .feature-card .tag-row span {
            background: rgba(47, 139, 255, 0.08);
            border: 1px solid rgba(86, 138, 255, 0.16);
            font-size: 10.5px;
            padding: 3px 10px;
            border-radius: 4px;
            color: #bcd4ff;
        }

        /* ===== BOTTOM TAGLINE ===== */
        .bottom-tagline {
            margin-top: 32px;
            text-align: center;
            padding: 20px 16px;
            border-top: 1px solid rgba(86, 138, 255, 0.10);
            border-bottom: 1px solid rgba(86, 138, 255, 0.10);
        }
        .bottom-tagline h3 {
            font-size: 24px;
            font-weight: 700;
        }
        .bottom-tagline h3 .accent {
            color: #2f8bff;
        }
        .bottom-tagline p {
            color: #a9b6d6;
            font-size: 14px;
            margin-top: 4px;
        }

        /* ============================================================
                   RESPONSIVE – TABLET
                ============================================================ */
        @media (max-width: 1180px) {
            .wrap {
                padding: 22px 28px 32px;
            }
            .hero {
                grid-template-columns: 1fr;
                gap: 24px;
                margin-top: 10px;
            }
            .hero-left h1 {
                font-size: 44px;
            }
            .hero-right {
                margin-top: 4px;
            }
            .hero-image-wrap {
                max-width: 100%;
            }
            .fb-1 {
                left: 0;
                top: 8%;
            }
            .fb-2 {
                right: 0;
                bottom: 12%;
            }
            .fb-3 {
                right: 0;
                top: 50%;
            }
            .stats-strip {
                grid-template-columns: repeat(3, 1fr);
                margin-top: 22px;
                padding: 16px 18px;
            }
            .mini-features {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }
            .feature-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }
            .features-section {
                margin-top: 28px;
            }
            .bottom-tagline {
                margin-top: 28px;
                padding: 18px 16px;
            }
            .top-actions {
                gap: 10px;
            }
            .top-btn {
                font-size: 12px;
                padding: 8px 18px;
            }
        }

        /* ============================================================
                   RESPONSIVE – MOBILE (max-width: 760px)
                ============================================================ */
        @media (max-width: 760px) {
            .wrap {
                padding: 14px 16px 20px;
            }

            .top-actions {
                gap: 8px;
                margin-bottom: 10px;
            }
            .top-btn {
                font-size: 11px;
                padding: 6px 14px;
                gap: 6px;
                border-radius: 30px;
            }
            .top-btn .icon {
                width: 14px;
                height: 14px;
            }

            .hero {
                margin-top: 4px;
                gap: 14px;
            }
            .hero-left h1 {
                font-size: 28px;
                letter-spacing: -0.5px;
            }
            .hero-sub {
                font-size: 13.5px;
                margin-bottom: 16px;
            }
            .hero-swoosh {
                width: 90px;
                height: 6px;
                margin: 4px 0 10px 0;
            }

            .cta-row {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 18px;
                justify-content: flex-start;
            }
            .btn {
                flex: 0 1 auto;
                width: auto;
                padding: 10px 16px;
                font-size: 13px;
                min-width: 120px;
                justify-content: center;
                white-space: nowrap;
            }

            .hero-image-wrap {
                position: relative;
                display: block;
                padding: 0;
                background: transparent;
                border-radius: 12px;
                overflow: visible;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.60);
            }
            .hero-image-wrap img {
                border-radius: 12px;
                margin-top: 0;
            }

            .float-badge {
                position: absolute !important;
                top: auto !important;
                left: auto !important;
                right: auto !important;
                bottom: auto !important;
                transform: none !important;
                animation: floaty 5s ease-in-out infinite !important;
                padding: 6px 10px;
                width: auto;
                max-width: 44%;
                min-width: 130px;
                border-radius: 8px;
                background: rgba(10, 20, 45, 0.92);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(86, 138, 255, 0.30);
                box-shadow: 0 6px 18px rgba(0, 0, 0, 0.60);
                gap: 8px;
            }
            .float-badge .fb-icon {
                width: 26px;
                height: 26px;
            }
            .float-badge .fb-text h4 {
                font-size: 11px;
            }
            .float-badge .fb-text p {
                font-size: 9px;
            }

            .fb-1 {
                top: 6% !important;
                left: 6px !important;
                right: auto !important;
            }
            .fb-2 {
                bottom: 6% !important;
                right: 6px !important;
                left: auto !important;
            }
            .fb-3 {
                top: 50% !important;
                right: 6px !important;
                left: auto !important;
                transform: translateY(-50%) !important;
                animation-delay: 0.4s !important;
            }
            .fb-3 {
                animation-name: floaty3-mobile !important;
            }
            @keyframes floaty3-mobile {
                0%,
                100% {
                    transform: translateY(0) translateY(-50%);
                }
                50% {
                    transform: translateY(-4px) translateY(-50%);
                }
            }
            .fb-1 {
                animation-name: floaty-mobile !important;
            }
            .fb-2 {
                animation-name: floaty2-mobile !important;
            }
            @keyframes floaty-mobile {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-4px);
                }
            }
            @keyframes floaty2-mobile {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-4px);
                }
            }

            .stats-strip {
                grid-template-columns: 1fr 1fr;
                margin-top: 16px;
                padding: 12px 12px;
                gap: 8px;
                border-radius: 10px;
            }
            .stat .ic {
                width: 32px;
                height: 32px;
                border-radius: 8px;
            }
            .stat h3 {
                font-size: 16px;
            }
            .stat p {
                font-size: 11px;
            }
            .stat {
                gap: 8px;
            }

            .mini-features {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .mini-feature {
                gap: 6px;
            }
            .mini-icon {
                width: 28px;
                height: 28px;
                border-radius: 6px;
            }
            .mini-feature h4 {
                font-size: 11.5px;
            }
            .mini-feature p {
                font-size: 10px;
            }

            .features-section {
                margin-top: 20px;
            }
            .features-section h2 {
                font-size: 22px;
                margin-bottom: 4px;
            }
            .features-section .section-desc {
                font-size: 13px;
                margin-bottom: 16px;
            }
            .feature-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .feature-card {
                padding: 16px 16px;
                border-radius: 10px;
            }
            .feature-card .fc-icon {
                width: 40px;
                height: 40px;
                margin-bottom: 8px;
            }
            .feature-card h3 {
                font-size: 15px;
            }
            .feature-card p {
                font-size: 12px;
            }
            .feature-card .tag-row {
                margin-top: 8px;
            }
            .feature-card .tag-row span {
                font-size: 9.5px;
                padding: 2px 8px;
            }

            .bottom-tagline {
                margin-top: 20px;
                padding: 14px 12px;
            }
            .bottom-tagline h3 {
                font-size: 18px;
            }
            .bottom-tagline p {
                font-size: 12.5px;
            }
        }

        /* ============================================================
                   RESPONSIVE – SMALL MOBILE (max-width: 420px)
                ============================================================ */
        @media (max-width: 420px) {
            .wrap {
                padding: 10px 12px 16px;
            }
            .top-actions {
                gap: 6px;
                margin-bottom: 8px;
            }
            .top-btn {
                font-size: 10px;
                padding: 5px 10px;
                gap: 4px;
            }
            .top-btn .icon {
                width: 12px;
                height: 12px;
            }

            .hero-left h1 {
                font-size: 22px;
            }
            .hero-sub {
                font-size: 12.5px;
                margin-bottom: 12px;
            }
            .cta-row {
                gap: 6px;
                margin-bottom: 12px;
            }
            .btn {
                font-size: 12px;
                padding: 8px 12px;
                min-width: 90px;
            }
            .float-badge {
                max-width: 48%;
                min-width: 100px;
                padding: 4px 8px;
            }
            .float-badge .fb-icon {
                width: 20px;
                height: 20px;
            }
            .float-badge .fb-text h4 {
                font-size: 10px;
            }
            .float-badge .fb-text p {
                font-size: 8.5px;
            }
            .fb-1 {
                top: 4% !important;
                left: 4px !important;
            }
            .fb-2 {
                bottom: 4% !important;
                right: 4px !important;
            }
            .fb-3 {
                right: 4px !important;
            }
            .mini-features {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .mini-feature {
                gap: 4px;
            }
            .mini-icon {
                width: 24px;
                height: 24px;
            }
            .mini-feature h4 {
                font-size: 10.5px;
            }
            .mini-feature p {
                font-size: 9px;
            }
            .stats-strip {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
                padding: 10px 10px;
            }
            .stat .ic {
                width: 28px;
                height: 28px;
            }
            .stat h3 {
                font-size: 14px;
            }
            .stat p {
                font-size: 10px;
            }
            .features-section h2 {
                font-size: 19px;
            }
